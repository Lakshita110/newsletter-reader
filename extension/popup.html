<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, sans-serif; font-size: 13px; padding: 12px; width: 260px; }
    label { display: block; margin-bottom: 4px; color: #555; }
    input { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    button { margin-top: 8px; padding: 6px 12px; background: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    p { margin: 8px 0 0; color: #888; font-size: 12px; }
  </style>
</head>
<body>
  <label for="baseUrl">Reader URL</label>
  <input id="baseUrl" type="url" placeholder="https://newsletter-reader-two.vercel.app" />
  <button id="save">Save</button>
  <p>Press <strong>Cmd+S</strong> on any article to save it.</p>
  <script src="popup.js"></script>
</body>
</html>
